<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Map 推薦美食餐廳系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 marked.js 用於渲染 Markdown 為 HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 針對 Markdown 產生的表格進行樣式美化 */
        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .prose th,
        .prose td {
            border: 1px solid #e5e7eb;
            padding: 0.75rem;
            text-align: left;
        }

        .prose th {
            background-color: #f9fafb;
            font-weight: 600;
        }

        /* 備用樣式，防止 Tailwind 載入失敗或延遲時畫面大跑版 */
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800 p-4 sm:p-8 font-sans">
    <div class="max-w-4xl mx-auto bg-white p-4 sm:p-8 rounded-xl shadow-sm border border-slate-200">
        <h1 class="text-2xl sm:text-3xl font-bold mb-4 sm:mb-6 text-slate-900 border-b pb-4">📍 Google Maps 高分店家指南</h1>

        <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 mb-6">
            <input type="text" id="region"
                class="border border-slate-300 p-3 w-full rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="請輸入想查詢的地區 (例如：台南市中西區 牛肉湯)">
            <button onclick="search()"
                class="bg-blue-600 text-white px-8 py-3 w-full sm:w-auto rounded-lg hover:bg-blue-700 font-semibold transition-colors">搜尋</button>
        </div>

        <div id="loading" class="text-slate-500 hidden flex items-center gap-2 mb-6 font-medium">
            <svg class="animate-spin h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24" width="24" height="24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            正在向 Google Maps API 抓取資料，請稍候...
        </div>

        <!-- 結果區塊：包含分頁表格與 Markdown 原始碼 -->
        <div id="result-container" class="hidden">
            <div class="overflow-x-auto bg-white rounded-lg border border-slate-200">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 border-b border-slate-200 text-slate-800">
                            <th class="p-3 font-semibold">店家名稱</th>
                            <th class="p-3 font-semibold">地址</th>
                            <th class="p-3 font-semibold">電話</th>
                            <th class="p-3 font-semibold">評分</th>
                            <th class="p-3 font-semibold">評論數</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-slate-700">
                        <!-- 分頁資料動態產生處 -->
                    </tbody>
                </table>
            </div>

            <!-- 分頁按鈕區 -->
            <div class="flex flex-col sm:flex-row justify-between items-center mt-4 border-t pt-4 gap-4 sm:gap-0">
                <span id="page-info" class="text-sm font-medium text-slate-600 text-center sm:text-left"></span>
                <div class="flex space-x-2 w-full sm:w-auto justify-center sm:justify-end">
                    <button onclick="changePage(-1)" id="btn-prev"
                        class="flex-1 sm:flex-none px-4 py-2 bg-white border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition-colors">上一頁</button>
                    <button onclick="changePage(1)" id="btn-next"
                        class="flex-1 sm:flex-none px-4 py-2 bg-white border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition-colors">下一頁</button>
                </div>
            </div>
        </div>

        <div id="empty-state" class="text-slate-400 text-center mt-10">搜尋結果將顯示於此...</div>
    </div>

    <script src="app.js"></script>
</body>

</html>
